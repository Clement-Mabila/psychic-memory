<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Main orb -->
    <linearGradient id="orb" x1="60" y1="50" x2="195" y2="195">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="45%" stop-color="#6366F1"/>
      <stop offset="75%" stop-color="#C026D3"/>
      <stop offset="100%" stop-color="#7EE7F8"/>
    </linearGradient>

    <!-- Cyan glow -->
    <radialGradient id="cyanGlow">
      <stop offset="0%" stop-color="#9AF7F3"/>
      <stop offset="100%" stop-color="#9AF7F3" stop-opacity="0"/>
    </radialGradient>

    <!-- Fuchsia glow -->
    <radialGradient id="pinkGlow">
      <stop offset="0%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#E879F9" stop-opacity="0"/>
    </radialGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGradient" x1="40" y1="40" x2="220" y2="220">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#7EE7F8"/>
    </linearGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

  </defs>

  <!-- Outer colored ring -->
  <circle
    cx="128"
    cy="128"
    r="88"
    fill="none"
    stroke="url(#ringGradient)"
    stroke-width="5"
    opacity="0.75"
  />

  <circle
    cx="128"
    cy="128"
    r="84"
    fill="none"
    stroke="#B9F8FF"
    stroke-opacity="0.25"
    stroke-width="2"
  />

  <!-- Main sphere -->
  <circle
    cx="128"
    cy="128"
    r="80"
    fill="url(#orb)"
  />

  <!-- Fuchsia energy mass -->
  <circle
    cx="104"
    cy="88"
    r="40"
    fill="url(#pinkGlow)"
    opacity="0.9"
  />

  <!-- Cyan energy mass -->
  <circle
    cx="165"
    cy="150"
    r="48"
    fill="url(#cyanGlow)"
    opacity="0.9"
  />

  <!-- Orbital curve 1 -->
  <path
    d="M55 155
       C85 105 165 95 212 140"
    fill="none"
    stroke="#FFFFFF"
    stroke-opacity="0.28"
    stroke-width="2.4"
    stroke-linecap="round"
  />

  <!-- Orbital curve 2 -->
  <path
    d="M70 184
       C120 145 175 145 208 175"
    fill="none"
    stroke="#BFFAFF"
    stroke-opacity="0.22"
    stroke-width="1.8"
    stroke-linecap="round"
  />

  <!-- Orbital curve 3 -->
  <path
    d="M95 50
       C140 85 145 170 112 210"
    fill="none"
    stroke="#F0ABFC"
    stroke-opacity="0.18"
    stroke-width="1.5"
    stroke-linecap="round"
  />

  <!-- Glass highlight -->
  <ellipse
    cx="108"
    cy="95"
    rx="28"
    ry="16"
    transform="rotate(-25 108 95)"
    fill="white"
    opacity="0.14"
  />

  <!-- Soft ambient glow -->
  <circle
    cx="128"
    cy="128"
    r="96"
    fill="#D946EF"
    opacity="0.08"
    filter="url(#blur)"
  />

</svg>